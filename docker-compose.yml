services:
  anything2ontology:
    build: .
    image: anything2ontology:latest
    env_file: .env
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./ontology:/app/ontology
      - ./logs:/app/logs
    stdin_open: true    # For interactive chatbot
    tty: true           # For interactive chatbot
